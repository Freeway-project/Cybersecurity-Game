services:
  mongo:
    image: mongo:7.0
    container_name: cybersecurity-game-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    command: ["--bind_ip_all"]
    environment:
      MONGO_INITDB_DATABASE: cybersecurity_game
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_data:
